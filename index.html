<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ghostline Champions: AetherRose League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gh-bg-0:        #13090b;
      --gh-bg-1:        #2f111a;
      --gh-bg-2:        #6f1f2a;
      --gh-ink:         #f7e8d7;
      --gh-muted:       #d9c5b3;
      --gh-accent:      #f0533a;
      --gh-accent-soft: #ffc3a1;
      --gh-line:        rgba(255,222,199,0.28);
      --gh-good:        #7df5c3;
      --gh-warn:        #ffd079;
      --gh-bad:         #ff8a8a;
      --gh-radius-sm:   10px;
      --gh-radius-md:   14px;
      --gh-radius-lg:   18px;
      --gh-shadow:      0 18px 40px rgba(0,0,0,0.38);
      --gh-font-ui:     "Space Mono", ui-monospace, monospace;
      --gh-font-display:"Cinzel", Georgia, serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--gh-font-ui);
      color: var(--gh-ink);
      min-height: 100dvh;
      background:
        radial-gradient(circle at 16% 12%, rgba(255,195,161,.22), transparent 46%),
        radial-gradient(circle at 84%  8%, rgba(240, 83, 58,.25), transparent 42%),
        linear-gradient(135deg, var(--gh-bg-0), var(--gh-bg-1) 45%, var(--gh-bg-2));
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      gap: 20px;
    }
    .gh-panel {
      background: rgba(15,5,7,.72);
      border: 1px solid var(--gh-line);
      border-radius: var(--gh-radius-lg);
      box-shadow: var(--gh-shadow);
      backdrop-filter: blur(5px);
      padding: 20px 24px;
      width: 100%;
      max-width: 720px;
    }
    .gh-title   { font-family: var(--gh-font-display); letter-spacing:.05em; color:#ffe7d5; }
    .gh-subtitle{ color: var(--gh-muted); font-size:.88rem; margin-top:4px; }
    .league-header { text-align:center; }
    .league-header h1 { font-size: clamp(1.2rem, 4vw, 1.8rem); }
    .status-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 720px;
    }
    .status-block { padding: 16px 20px; }
    .status-block .name { font-family: var(--gh-font-display); font-size:.95rem; color:#ffe7d5; }
    .status-block .title-line { font-size:.72rem; color: var(--gh-muted); margin-bottom:12px; }
    .bar-label { font-size:.7rem; color: var(--gh-muted); display:flex; justify-content:space-between; margin-bottom:4px; }
    .gh-bar { height:10px; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.18); border-radius:999px; overflow:hidden; margin-bottom:10px; }
    .gh-bar > span { display:block; height:100%; border-radius:999px; transition:width .4s ease; }
    .gh-bar.hp > span { background: linear-gradient(90deg, #f7d19d, #f0533a); }
    .gh-bar.en > span { background: linear-gradient(90deg, #a3f5d7, #66c9e2); }
    .enemy-panel .name { color: var(--gh-accent-soft); }
    #battle-log { min-height:72px; font-size:.82rem; color:var(--gh-muted); line-height:1.7; white-space:pre-wrap; }
    .move-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; margin-top:4px; }
    .gh-btn { border:1px solid var(--gh-line); border-radius:var(--gh-radius-md); background:linear-gradient(130deg,rgba(255,255,255,.07),rgba(255,255,255,.02)); color:var(--gh-ink); padding:12px 14px; font:inherit; font-size:.8rem; cursor:pointer; transition:180ms ease; text-align:left; line-height:1.5; }
    .gh-btn:hover:not(:disabled) { border-color:rgba(255,195,161,.75); transform:translateY(-1px); background:linear-gradient(130deg,rgba(240,83,58,.22),rgba(255,255,255,.04)); }
    .gh-btn:disabled { opacity:.35; cursor:default; }
    .move-name { font-weight:700; display:block; color:#ffe7d5; }
    .move-meta { font-size:.72rem; color:var(--gh-muted); }
    .move-type { display:inline-block; margin-right:6px; }
    .move-type.Flame  { color:var(--gh-accent); }
    .move-type.Void   { color:#c3aaff; }
    .move-type.Utility{ color:var(--gh-good); }
    .gh-pill { display:inline-flex; align-items:center; gap:6px; border:1px solid var(--gh-line); background:rgba(255,255,255,.04); border-radius:999px; padding:3px 10px; font-size:.72rem; }
    .gauntlet-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; font-size:.75rem; color:var(--gh-muted); }
    .gauntlet-pip { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.15); border:1px solid var(--gh-line); transition:background .3s; }
    .gauntlet-pip.done    { background:var(--gh-good); border-color:var(--gh-good); }
    .gauntlet-pip.current { background:var(--gh-accent); border-color:var(--gh-accent); }
    #overlay { position:fixed; inset:0; background:rgba(10,3,5,.88); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; z-index:100; }
    #overlay.hidden { display:none; }
    #overlay h2 { font-family:var(--gh-font-display); font-size:2rem; color:#ffe7d5; text-align:center; }
    #overlay p  { color:var(--gh-muted); font-size:.9rem; text-align:center; max-width:320px; }
    #overlay .gh-btn { min-width:180px; text-align:center; padding:14px 20px; }
  </style>
</head>
<body>

<div id="overlay">
  <h2 id="overlay-title" class="gh-title">AetherRose League</h2>
  <p id="overlay-sub">Clear a three-champion gauntlet. Decode each protocol. Keep your sigils alive.</p>
  <button class="gh-btn" id="overlay-btn" onclick="overlayAction()">Begin Run</button>
</div>

<div class="gh-panel league-header">
  <h1 class="gh-title">Ghostline Champions</h1>
  <p class="gh-subtitle">AetherRose League — Gauntlet Protocol</p>
</div>

<div class="gh-panel" style="padding:14px 24px;">
  <div class="gauntlet-row">
    <span>Gauntlet:</span>
    <div class="gauntlet-pip" id="pip-0"></div>
    <div class="gauntlet-pip" id="pip-1"></div>
    <div class="gauntlet-pip" id="pip-2"></div>
    <span id="gauntlet-label" style="margin-left:6px;">—</span>
  </div>
</div>

<div class="status-row">
  <div class="gh-panel status-block" id="player-panel">
    <div class="name" id="player-name">—</div>
    <div class="title-line">You</div>
    <div class="bar-label"><span>HP</span><span id="player-hp-val">—</span></div>
    <div class="gh-bar hp"><span id="player-hp-bar" style="width:100%"></span></div>
    <div class="bar-label"><span>Energy</span><span id="player-en-val">—</span></div>
    <div class="gh-bar en"><span id="player-en-bar" style="width:100%"></span></div>
  </div>
  <div class="gh-panel status-block enemy-panel" id="enemy-panel">
    <div class="name" id="enemy-name">—</div>
    <div class="title-line" id="enemy-title">Champion</div>
    <div class="bar-label"><span>HP</span><span id="enemy-hp-val">—</span></div>
    <div class="gh-bar hp"><span id="enemy-hp-bar" style="width:100%"></span></div>
    <div class="bar-label"><span>Energy</span><span id="enemy-en-val">—</span></div>
    <div class="gh-bar en"><span id="enemy-en-bar" style="width:100%"></span></div>
  </div>
</div>

<div class="gh-panel" id="log-panel">
  <div id="battle-log">Awaiting run start…</div>
</div>

<div class="gh-panel" style="max-width:720px;width:100%">
  <p class="gh-subtitle" style="margin-bottom:14px;">Your Moves</p>
  <div class="move-grid" id="move-grid"></div>
</div>

<script>
const CHAMPIONS = [
  {
    id:"oracle_voss", name:"Oracle Voss", title:"Keeper of the First Clock",
    hp:120, energy:5,
    moves:[
      { id:"time_fracture",  name:"Time Fracture",  type:"Void",   dmg:22, heal:0,  cost:1, desc:"Splinters the current protocol." },
      { id:"stasis_field",   name:"Stasis Field",   type:"Utility",dmg:0,  heal:18, cost:2, desc:"Suspends incoming damage for one turn." },
      { id:"orbit_strike",   name:"Orbit Strike",   type:"Flame",  dmg:34, heal:0,  cost:3, desc:"Channels orbital debris into a single hit." }
    ]
  },
  {
    id:"signal_rei", name:"Signal Rei", title:"Daughter of Static",
    hp:100, energy:6,
    moves:[
      { id:"protocol_break", name:"Protocol Break", type:"Void",   dmg:38, heal:0,  cost:2, desc:"Tears open the opponent's defense layer." },
      { id:"mars_veil",      name:"Mars Veil",      type:"Flame",  dmg:0,  heal:20, cost:1, desc:"Wraps in crimson signal — restores vitality." },
      { id:"frequency_burn", name:"Frequency Burn", type:"Flame",  dmg:28, heal:0,  cost:2, desc:"Broadcasts a destructive resonance wave." }
    ]
  },
  {
    id:"aether_rose", name:"AetherRose", title:"Goddess of Mars — Final Champion",
    hp:150, energy:4,
    moves:[
      { id:"rose_singularity",name:"Rose Singularity",type:"Void",  dmg:50, heal:0,  cost:3, desc:"Collapses all timelines into one decisive strike." },
      { id:"sigil_bloom",    name:"Sigil Bloom",    type:"Utility",dmg:0,  heal:30, cost:2, desc:"Reads the sigils — restores a fragment of self." },
      { id:"crimson_decode", name:"Crimson Decode", type:"Flame",  dmg:32, heal:0,  cost:2, desc:"Find the key. Read the sigils. Decode the protocol." }
    ]
  }
];

const PLAYER = {
  name:"Amara\u2234", title:"Void Exile",
  hp:110, maxHp:110, energy:5, maxEnergy:5,
  moves:[
    { id:"sigil_strike",  name:"Sigil Strike",  type:"Void",   dmg:26, heal:0,  cost:1, desc:"A mark that cannot be unseen." },
    { id:"void_pulse",    name:"Void Pulse",    type:"Void",   dmg:36, heal:0,  cost:2, desc:"Sends a wave through the between-space." },
    { id:"rose_mend",     name:"Rose Mend",     type:"Utility",dmg:0,  heal:22, cost:2, desc:"Pulls warmth from the Mars current." },
    { id:"null_key",      name:"Null Key",      type:"Flame",  dmg:44, heal:0,  cost:3, desc:"The key that decodes everything — at a cost." }
  ]
};

const state = { phase:"idle", championIndex:0, player:null, enemy:null, playerShield:false, enemyShield:false };

function deepClone(o){ return JSON.parse(JSON.stringify(o)); }
function log(msg){ document.getElementById("battle-log").textContent = msg; }

function updateBars(){
  const p=state.player, e=state.enemy;
  document.getElementById("player-name").textContent   = p.name;
  document.getElementById("player-hp-val").textContent = `${Math.max(0,p.hp)} / ${p.maxHp}`;
  document.getElementById("player-en-val").textContent = `${p.energy} / ${p.maxEnergy}`;
  document.getElementById("player-hp-bar").style.width = `${Math.max(0,p.hp/p.maxHp*100)}%`;
  document.getElementById("player-en-bar").style.width = `${p.energy/p.maxEnergy*100}%`;
  document.getElementById("enemy-name").textContent    = e.name;
  document.getElementById("enemy-title").textContent   = e.title;
  document.getElementById("enemy-hp-val").textContent  = `${Math.max(0,e.hp)} / ${e.maxHp}`;
  document.getElementById("enemy-en-val").textContent  = `${e.energy} / ${e.maxEnergy}`;
  document.getElementById("enemy-hp-bar").style.width  = `${Math.max(0,e.hp/e.maxHp*100)}%`;
  document.getElementById("enemy-en-bar").style.width  = `${e.energy/e.maxEnergy*100}%`;
}

function updatePips(){
  for(let i=0;i<3;i++){
    const pip=document.getElementById(`pip-${i}`);
    pip.className="gauntlet-pip";
    if(i<state.championIndex) pip.classList.add("done");
    else if(i===state.championIndex) pip.classList.add("current");
  }
  const labels=["Champion 1 of 3","Champion 2 of 3","Final Champion","Gauntlet cleared!"];
  document.getElementById("gauntlet-label").textContent=labels[Math.min(state.championIndex,3)];
}

function renderMoves(locked=false){
  const grid=document.getElementById("move-grid"); grid.innerHTML="";
  PLAYER.moves.forEach(m=>{
    const affordable=state.player&&state.player.energy>=m.cost;
    const btn=document.createElement("button");
    btn.className="gh-btn";
    btn.disabled=locked||!affordable;
    btn.innerHTML=`<span class="move-name">${m.name}</span><span class="move-meta"><span class="move-type ${m.type}">${m.type}</span>${m.dmg?`Dmg ${m.dmg}`:`Heal ${m.heal}`} &middot; Cost ${m.cost}</span>`;
    btn.title=m.desc;
    btn.onclick=()=>playerMove(m);
    grid.appendChild(btn);
  });
}

function startRun(){
  state.championIndex=0;
  state.player=Object.assign(deepClone(PLAYER),{maxHp:PLAYER.hp,maxEnergy:PLAYER.energy});
  startFight();
}

function startFight(){
  const c=deepClone(CHAMPIONS[state.championIndex]);
  c.maxHp=c.hp; c.maxEnergy=c.energy;
  state.enemy=c; state.playerShield=false; state.enemyShield=false; state.phase="combat";
  updateBars(); updatePips(); renderMoves(false);
  log(`${c.name} steps forward. "${c.title}" — the protocol begins.`);
  document.getElementById("overlay").classList.add("hidden");
}

function playerMove(move){
  if(state.phase!=="combat") return;
  renderMoves(true);
  const p=state.player, e=state.enemy;
  p.energy=Math.max(0,p.energy-move.cost);
  let playerMsg="";
  if(move.heal>0){
    const actual=Math.min(move.heal,p.maxHp-p.hp);
    p.hp=Math.min(p.maxHp,p.hp+move.heal);
    playerMsg=`You used ${move.name} — restored ${actual} HP.`;
  } else {
    const dmg=state.enemyShield?Math.floor(move.dmg*.4):move.dmg;
    e.hp-=dmg; state.enemyShield=false;
    playerMsg=`You used ${move.name} — dealt ${dmg} damage to ${e.name}.`;
  }
  updateBars();
  if(e.hp<=0){
    e.hp=0; updateBars();
    log(`${playerMsg}\n\n${e.name} has been defeated. Protocol decoded.`);
    setTimeout(advanceGauntlet,1400); return;
  }
  setTimeout(()=>{
    const em=pickEnemyMove(e);
    let enemyMsg="";
    if(em.heal>0){
      const actual=Math.min(em.heal,e.maxHp-e.hp);
      e.hp=Math.min(e.maxHp,e.hp+em.heal);
      enemyMsg=`${e.name} used ${em.name} — restored ${actual} HP.`;
    } else if(em.id==="stasis_field"){
      state.enemyShield=true;
      enemyMsg=`${e.name} used ${em.name} — defense fortified.`;
    } else {
      const dmg=state.playerShield?Math.floor(em.dmg*.4):em.dmg;
      p.hp-=dmg; state.playerShield=false;
      enemyMsg=`${e.name} used ${em.name} — dealt ${dmg} damage to you.`;
    }
    e.energy=Math.max(0,e.energy-em.cost);
    updateBars();
    log(`${playerMsg}\n${enemyMsg}`);
    p.energy=Math.min(p.maxEnergy,p.energy+1);
    e.energy=Math.min(e.maxEnergy,e.energy+1);
    updateBars();
    if(p.hp<=0){ p.hp=0; updateBars(); log(`${playerMsg}\n${enemyMsg}\n\nYour sigil has fallen. The protocol remains locked.`); showOverlay("lose"); return; }
    state.phase="combat"; renderMoves(false);
  },700);
}

function pickEnemyMove(e){
  const aff=e.moves.filter(m=>e.energy>=m.cost);
  if(!aff.length) return e.moves[0];
  const heals=aff.filter(m=>m.heal>0);
  if(heals.length&&e.hp<e.maxHp*.4) return heals[0];
  return aff[Math.floor(Math.random()*aff.length)];
}

function advanceGauntlet(){
  state.championIndex++;
  if(state.championIndex>=CHAMPIONS.length){ showOverlay("win"); return; }
  state.player.hp=Math.min(state.player.maxHp,state.player.hp+30);
  state.player.energy=state.player.maxEnergy;
  startFight();
}

function showOverlay(result){
  state.phase=result; renderMoves(true);
  const ov=document.getElementById("overlay");
  ov.classList.remove("hidden");
  if(result==="win"){
    document.getElementById("overlay-title").textContent="Protocol Decoded.";
    document.getElementById("overlay-sub").textContent="You cleared the AetherRose League. The sigils are yours.";
    document.getElementById("overlay-btn").textContent="Run Again";
  } else {
    document.getElementById("overlay-title").textContent="Sigil Fallen.";
    document.getElementById("overlay-sub").textContent="The gauntlet holds. Find the key — decode the protocol.";
    document.getElementById("overlay-btn").textContent="Try Again";
  }
}

function overlayAction(){ startRun(); }
updatePips(); renderMoves(true);
</script>
</body>
</html>
